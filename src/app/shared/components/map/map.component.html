<div #mapContainer class="map" role="application" aria-label="Mapa de gasolineras cercanas"></div>

<ion-select
  class="map__fuel-filter"
  fill="solid"
  interface="popover"
  [value]="selectedFuel()"
  (ionChange)="onFuelChange($event)"
  aria-label="Filtrar gasolineras por tipo de combustible"
>
  <ion-select-option value="gasolina95">{{ fuelLabels.gasolina95 }}</ion-select-option>
  <ion-select-option value="gasolina98">{{ fuelLabels.gasolina98 }}</ion-select-option>
  <ion-select-option value="diesel">{{ fuelLabels.diesel }}</ion-select-option>
</ion-select>

@if (locationError() || stationsError()) {
  <div class="map__errors">
    @if (locationError()) {
      <p class="map__error" role="alert">
        No se pudo obtener tu ubicación: {{ locationError() }}
      </p>
    }
    @if (stationsError()) {
      <p class="map__error" role="alert">
        No se pudieron cargar las gasolineras: {{ stationsError() }}
      </p>
    }
  </div>
}
