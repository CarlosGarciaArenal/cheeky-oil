<ion-app>
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-title>
        <div class="brand">
          <img class="brand__logo" src="assets/logo.svg" alt="Logotipo de Cheeky Oil" width="32" height="32" />
          <span class="brand__name">Cheeky Oil</span>
        </div>
      </ion-title>

      @if (authService.currentUser()) {
        <ion-buttons slot="end">
          <ion-button (click)="onLogout()" aria-label="Cerrar sesión">
            <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      }
    </ion-toolbar>
  </ion-header>

  <ion-router-outlet></ion-router-outlet>
</ion-app>
