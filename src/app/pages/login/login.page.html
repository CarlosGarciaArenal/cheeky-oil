<ion-content class="login" [fullscreen]="true" [scrollY]="false">
  <div class="login__wrapper">
    <img class="login__logo" src="assets/logo.svg" alt="Logotipo de Cheeky Oil" width="72" height="72" />
    <h1 class="login__title">Cheeky Oil</h1>
    <p class="login__subtitle">Inicia sesión para ver las gasolineras cerca de ti</p>

    <form class="login__form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <ion-list class="login__list" lines="full">
        <ion-item>
          <ion-input
            label="Email"
            labelPlacement="floating"
            type="email"
            formControlName="email"
            autocomplete="email"
            inputmode="email"
            [errorText]="'Introduce un email válido.'"
            [class.ion-invalid]="form.controls.email.touched && form.controls.email.invalid"
            [class.ion-touched]="form.controls.email.touched"
          ></ion-input>
        </ion-item>
        <ion-item>
          <ion-input
            label="Contraseña"
            labelPlacement="floating"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            [errorText]="'La contraseña es obligatoria.'"
            [class.ion-invalid]="form.controls.password.touched && form.controls.password.invalid"
            [class.ion-touched]="form.controls.password.touched"
          ></ion-input>
        </ion-item>
      </ion-list>

      @if (errorMessage()) {
        <ion-text color="danger" class="login__error" role="alert">
          <p>{{ errorMessage() }}</p>
        </ion-text>
      }

      <ion-button class="login__submit" type="submit" expand="block" [disabled]="loading()">
        @if (loading()) {
          <ion-spinner name="crescent" aria-label="Entrando..."></ion-spinner>
        } @else {
          Entrar
        }
      </ion-button>
    </form>
  </div>
</ion-content>
